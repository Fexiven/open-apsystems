# APsystems EZ1-M Microinverter — ESPHome via UART
# On/Off, Power Limit, full sensor readback, lifetime energy counter.
#
# UART data field map (confirmed from firmware at 0x14600):
#   c1, v1, p1, e1, c2, v2, p2, e2, gf, gv,
#   ep1, ep2, apw, rpw, appw, busv, rtime
#
# Byte layout (p = &bytes[4], all big-endian):
#   p[0:1]   BB 20    sub-cmd echo + device type
#   p[2:3]            DSP firmware version
#   p[4:5]            device ID / status (stable)
#   p[6:7]   FF FF    unused
#   p[8:15]  00...    reserved
#   p[16:17]          v1  — CH1 DC voltage      (raw ÷ 50)
#   p[18:19]          v2  — CH2 DC voltage      (raw ÷ 50)
#   p[20:21]          c1  — CH1 DC current      (raw ÷ 88)
#   p[22:23]          c2  — CH2 DC current      (raw ÷ 88)
#   p[24:25]          unknown — ~882, slight variance
#   p[26:27]          unknown — ~5001, very stable (busv?)
#   p[28:29]          rtime — inverter uptime (seconds)
#   p[30:31]          AC power output (W)
#   p[32:33]          temperature (°C)
#   p[34:35]  FF FF   unused
#   p[36:37]          gf  — grid frequency      (raw ÷ 27.32)
#   p[38:39]          unknown — tracks solar production (NOT grid voltage)
#   p[40:43]          e1  — CH1 session energy   (raw ÷ 65536 ÷ 1000 → kWh)
#   p[44:47]          e2  — CH2 session energy   (raw ÷ 65536 ÷ 1000 → kWh)
#   p[48]             inverter state byte
#   p[49]             unknown (0x01)
#   p[50:51]          power limit readback (raw)
#   p[52..91]  FF     padding

substitutions:
  name: apsystems-ez1
  friendly_name: APsystems EZ1
  # Calibration divisors — compare against a known-good meter and adjust
  dc_voltage_divisor: "50.0"
  dc_current_divisor: "88.0"
  grid_frequency_divisor: "27.32"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(total_kwh) = id(total_energy_nvs).state;

globals:
  - id: total_kwh
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: prev_daily
    type: float
    restore_value: false
    initial_value: '-1.0'

esp32:
  board: esp32-c2-devkitm-1
  variant: esp32c2
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_XTAL_FREQ_26: "y"

logger:
  baud_rate: 115200

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

uart:
  id: uart_inverter
  tx_pin: GPIO2
  rx_pin: GPIO1
  baud_rate: 57600
  debug:
    direction: RX
    dummy_receiver: true
    after:
      timeout: 200ms
    sequence:
      - lambda: |-
          if (bytes.size() < 8) return;
          if (bytes[0] != 0xFB || bytes[1] != 0xFB) return;
          uint8_t len = bytes[2];
          if (bytes.size() < (size_t)(len + 7)) return;
          if (bytes[len + 5] != 0xFE || bytes[len + 6] != 0xFE) return;

          // Validate 16-bit checksum
          uint16_t chk = 0;
          for (size_t i = 2; i < (size_t)(len + 3); i++) chk += bytes[i];
          if (bytes[len + 3] != (uint8_t)(chk >> 8) ||
              bytes[len + 4] != (uint8_t)(chk & 0xFF)) {
            ESP_LOGW("uart", "Checksum mismatch — dropping frame");
            return;
          }

          if (bytes[3] == 0xBB && len >= 52) {
            const uint8_t *p = &bytes[4];

            // DSP firmware version
            char ver[16];
            snprintf(ver, sizeof(ver), "%d.%d", p[2], p[3]);
            id(dsp_version).publish_state(ver);

            // v1, v2 — DC voltage per channel (raw ÷ 50)
            uint16_t ch1_v_raw = (p[16] << 8) | p[17];
            uint16_t ch2_v_raw = (p[18] << 8) | p[19];
            float ch1_v = ch1_v_raw / ${dc_voltage_divisor}f;
            float ch2_v = ch2_v_raw / ${dc_voltage_divisor}f;
            id(ch1_dc_voltage).publish_state(ch1_v);
            id(ch2_dc_voltage).publish_state(ch2_v);

            // c1, c2 — DC current per channel (raw ÷ 88)
            float ch1_i = ((p[20] << 8) | p[21]) / ${dc_current_divisor}f;
            float ch2_i = ((p[22] << 8) | p[23]) / ${dc_current_divisor}f;
            id(ch1_dc_current).publish_state(ch1_i);
            id(ch2_dc_current).publish_state(ch2_i);

            // p1, p2 — DC power per channel (V × I)
            float ch1_p = ch1_i * ch1_v;
            float ch2_p = ch2_i * ch2_v;
            id(ch1_dc_power).publish_state(ch1_p);
            id(ch2_dc_power).publish_state(ch2_p);
            id(total_dc_power).publish_state(ch1_p + ch2_p);

            // rtime — inverter uptime (seconds since DSP boot)
            id(inverter_uptime).publish_state((p[28] << 8) | p[29]);

            // AC power output (W)
            id(ac_power).publish_state((p[30] << 8) | p[31]);

            // Temperature (°C)
            uint16_t temp_raw = (p[32] << 8) | p[33];
            if (temp_raw > 0 && temp_raw < 200) {
              id(inverter_temperature).publish_state(temp_raw);
            }

            // gf — grid frequency (raw ÷ 27.32)
            uint16_t freq_raw = (p[36] << 8) | p[37];
            if (freq_raw != 0xFFFF) {
              float freq = freq_raw / ${grid_frequency_divisor}f;
              if (freq > 45.0f && freq < 55.0f) {
                id(grid_frequency).publish_state(freq);
              }
            }

            // p[38:39] — unknown, tracks solar production (NOT grid voltage)

            // e1, e2 — session energy per channel (resets each morning)
            uint32_t e_ch1 = ((uint32_t)p[40] << 24) | ((uint32_t)p[41] << 16) | (p[42] << 8) | p[43];
            uint32_t e_ch2 = ((uint32_t)p[44] << 24) | ((uint32_t)p[45] << 16) | (p[46] << 8) | p[47];
            id(ch1_session_energy).publish_state(e_ch1 / 65536.0f / 1000.0f);
            id(ch2_session_energy).publish_state(e_ch2 / 65536.0f / 1000.0f);
            id(daily_energy).publish_state((e_ch1 + e_ch2) / 65536.0f / 1000.0f);

            // Lifetime energy: accumulate delta in RAM
            float daily = (e_ch1 + e_ch2) / 65536.0f / 1000.0f;
            if (id(prev_daily) < 0) {
              // First poll after boot — just sync
            } else if (daily < id(prev_daily) - 0.01f) {
              // DSP rebooted (new day)
              id(total_kwh) += daily;
            } else {
              id(total_kwh) += daily - id(prev_daily);
            }
            id(prev_daily) = daily;
            id(lifetime_energy).publish_state(id(total_kwh));

            // Inverter state
            switch (p[48]) {
              case 0x00: id(inverter_state).publish_state("Producing"); break;
              case 0x02: id(inverter_state).publish_state("Standby"); break;
              case 0x03: id(inverter_state).publish_state("Ramping up"); break;
              default:
                char st[16];
                snprintf(st, sizeof(st), "Unknown 0x%02X", p[48]);
                id(inverter_state).publish_state(st);
            }

            // Power limit readback
            uint16_t mp_raw = (p[50] << 8) | p[51];
            if (mp_raw > 0) {
              float disc = 275.6728f + ((float)mp_raw - 300.0f) / 300.0f;
              float watts = roundf((-16.6034f + sqrtf(disc)) * 600.0f);
              id(power_limit).publish_state(fmaxf(30.0f, fminf(800.0f, watts)));
            }
          }

interval:
  - interval: 5s
    then:
      - uart.write:
          id: uart_inverter
          data: [0xFB, 0xFB, 0x06, 0xBB, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0xC1, 0xFE, 0xFE]

  # Save lifetime energy to NVS every hour
  - interval: 1h
    then:
      - lambda: |-
          auto call = id(total_energy_nvs).make_call();
          call.set_value(id(total_kwh));
          call.perform();

sensor:
  - platform: template
    name: "CH1 DC Voltage"
    id: ch1_dc_voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [timeout: 30s]

  - platform: template
    name: "CH2 DC Voltage"
    id: ch2_dc_voltage
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [timeout: 30s]

  - platform: template
    name: "CH1 DC Current"
    id: ch1_dc_current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters: [timeout: 30s]

  - platform: template
    name: "CH2 DC Current"
    id: ch2_dc_current
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters: [timeout: 30s]

  - platform: template
    name: "CH1 DC Power"
    id: ch1_dc_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters: [timeout: 30s]

  - platform: template
    name: "CH2 DC Power"
    id: ch2_dc_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters: [timeout: 30s]

  - platform: template
    name: "Total DC Power"
    id: total_dc_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters: [timeout: 30s]

  - platform: template
    name: "AC Power"
    id: ac_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters: [timeout: 30s]

  - platform: template
    name: "Grid Frequency"
    id: grid_frequency
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters: [timeout: 30s]

  - platform: template
    name: "Temperature"
    id: inverter_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    filters: [timeout: 30s]

  - platform: template
    name: "Daily Energy"
    id: daily_energy
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3

  - platform: template
    name: "CH1 Session Energy"
    id: ch1_session_energy
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3

  - platform: template
    name: "CH2 Session Energy"
    id: ch2_session_energy
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3

  - platform: template
    name: "Lifetime Energy"
    id: lifetime_energy
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    icon: mdi:lightning-bolt

  - platform: template
    name: "Inverter Uptime"
    id: inverter_uptime
    unit_of_measurement: "s"
    state_class: measurement
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "ESP Uptime"

text_sensor:
  - platform: template
    name: "Inverter State"
    id: inverter_state
    icon: mdi:state-machine

  - platform: template
    name: "DSP Version"
    id: dsp_version
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

number:
  - platform: template
    name: "Total Energy"
    id: total_energy_nvs
    unit_of_measurement: "kWh"
    device_class: energy
    entity_category: config
    min_value: 0
    max_value: 999999
    step: 0.001
    optimistic: true
    restore_value: true
    icon: mdi:lightning-bolt
    set_action:
      - lambda: |-
          id(total_kwh) = x;

  - platform: template
    name: "Power Limit"
    id: power_limit
    unit_of_measurement: "W"
    min_value: 30
    max_value: 800
    step: 1
    optimistic: false
    restore_value: true
    set_action:
      - lambda: |-
          float raw_f = (x * x) / 1200.0f + 16.6034f * x + 300.0f;
          uint16_t raw = (uint16_t)(raw_f + 0.5f);
          uint8_t hi = raw >> 8, lo = raw & 0xFF;
          uint16_t chk = 0x06 + 0xAA + 0xE1 + hi + lo;
          uint8_t frame[] = {0xFB, 0xFB, 0x06, 0xAA, 0xE1, 0x00, 0x00, hi, lo,
                             (uint8_t)(chk >> 8), (uint8_t)(chk & 0xFF), 0xFE, 0xFE};
          id(uart_inverter).write_array(frame, sizeof(frame));

switch:
  - platform: template
    name: "Inverter On/Off"
    id: inverter_onoff
    icon: mdi:power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          float w = id(power_limit).state;
          if (std::isnan(w) || w < 30.0f) w = 800.0f;
          float raw_f = (w * w) / 1200.0f + 16.6034f * w + 300.0f;
          uint16_t raw = (uint16_t)(raw_f + 0.5f);
          uint8_t hi = raw >> 8, lo = raw & 0xFF;
          uint16_t chk = 0x06 + 0xAA + 0xE1 + hi + lo;
          uint8_t frame[] = {0xFB, 0xFB, 0x06, 0xAA, 0xE1, 0x00, 0x00, hi, lo,
                             (uint8_t)(chk >> 8), (uint8_t)(chk & 0xFF), 0xFE, 0xFE};
          id(uart_inverter).write_array(frame, sizeof(frame));
    turn_off_action:
      - lambda: |-
          uint16_t chk = 0x06 + 0xAA + 0xE1;
          uint8_t frame[] = {0xFB, 0xFB, 0x06, 0xAA, 0xE1, 0x00, 0x00, 0x00, 0x00,
                             (uint8_t)(chk >> 8), (uint8_t)(chk & 0xFF), 0xFE, 0xFE};
          id(uart_inverter).write_array(frame, sizeof(frame));

button:
  - platform: restart
    name: "Restart"
