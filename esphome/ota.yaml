esphome:
  name: apsystems-ez1
  friendly_name: APsystems EZ1

esp32:
  board: esp32-c2-devkitm-1
  variant: esp32c2
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_XTAL_FREQ_26: "y"

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "APsystems-EZ1-Fallback"
    password: !secret ap_password

captive_portal:
